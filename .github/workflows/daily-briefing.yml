name: 每日简报

on:
  schedule:
    # 1:17am UTC = 9:17am Beijing (UTC+8).
    # Avoid the top of the hour, when GitHub scheduled workflows are most likely to be delayed or dropped.
    - cron: '17 1 * * *'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send daily briefing
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_ACCOUNT_EMAIL: ${{ secrets.RESEND_ACCOUNT_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/send_briefing.py
